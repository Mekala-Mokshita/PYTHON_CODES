<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume ATS Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h1>📄 Resume ATS Analyzer</h1>
    <p class="subtitle">Upload your resume to check ATS score</p>

    <form id="resumeForm">
        <input type="file" id="fileInput" accept=".pdf,.txt,image/*" required>
        <button type="submit">Analyze Resume</button>
    </form>

    <div id="loading" class="hidden">⏳ Analyzing your resume...</div>

    <div id="result" class="hidden">

        <div class="score-card">
            <span class="score-label">ATS Score</span>
            <span id="score" class="score-value">0</span>/100

            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>

        <div class="section">
            <h3>✅ Key Strengths</h3>
            <ul id="strengths"></ul>
        </div>

        <div class="section">
            <h3>⚠️ Weaknesses</h3>
            <ul id="weaknesses"></ul>
        </div>

        <div class="section">
            <h3>💼 Suggested Job Roles</h3>
            <ul id="roles"></ul>
        </div>

        <div class="section">
            <h3>🛠 Improvements</h3>
            <ul id="improvements"></ul>
        </div>

        <button id="downloadBtn">⬇ Download PDF Report</button>
    </div>
</div>

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
